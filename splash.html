<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quest Loading...</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{
    font-family:'Poppins',sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        180deg,
        #07141b,
        #0d1f29,
        #061017
    );

    overflow:hidden;
}

.container{
    text-align:center;

    animation:fadeIn 1s ease;
}

.logo{
    width:220px;
    max-width:70vw;

    animation:
    floatLogo 2s ease-in-out infinite;
}

.app-name{
    margin-top:10px;

    color:white;

    font-size:3rem;
    font-weight:800;

    letter-spacing:8px;
}

.tagline{
    color:#66ffab;

    margin-top:10px;

    font-size:1rem;
}

.loader{
    width:65px;
    height:65px;

    margin:35px auto 0;

    border:6px solid rgba(255,255,255,.15);
    border-top:6px solid #66ffab;

    border-radius:50%;

    animation:spin 1s linear infinite;
}

.loading-text{
    color:white;

    margin-top:18px;

    font-size:1rem;

    letter-spacing:2px;
}

.progress{
    width:240px;
    max-width:80vw;

    height:6px;

    background:rgba(255,255,255,.12);

    border-radius:999px;

    margin:20px auto 0;

    overflow:hidden;
}

.progress-bar{
    width:0%;

    height:100%;

    background:#66ffab;

    border-radius:999px;

    animation:loadBar 3s linear forwards;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
    }
    to{
        opacity:1;
    }
}

@keyframes floatLogo{
    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0);
    }
}

@keyframes loadBar{
    from{
        width:0%;
    }

    to{
        width:100%;
    }
}

@media(max-width:480px){

    .logo{
        width:180px;
    }

    .app-name{
        font-size:2.3rem;
    }

}

</style>
</head>

<body>

<div class="container">

    <img src="logo.png" alt="Quest Logo" class="logo">

    <div class="app-name">
        QUEST
    </div>

    <div class="tagline">
        Turn goals into quests.
    </div>

    <div class="loader"></div>

    <div class="loading-text">
        Loading...
    </div>

    <div class="progress">
        <div class="progress-bar"></div>
    </div>

</div>

<script>

setTimeout(() => {

    window.location.href = "index.html";

}, 3000);

</script>

</body>
</html>
