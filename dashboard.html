<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quest Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen" class="loading-screen">
    <div class="loader-box">
        <div class="spinner"></div>
        <h2>Loading Quest...</h2>
        <p>Preparing your adventure</p>
    </div>
</div>

<div class="dashboard-background"></div>

<div class="dashboard-container" id="dashboardContainer" style="display:none;">

    <!-- HEADER -->
    <div class="dashboard-header">

        <div>
            <p class="welcome-text">Welcome Back,</p>

            <h1 id="userName">Adventurer</h1>

            <p class="level-text">
                Level <span id="userLevel">1</span> Adventurer
            </p>
        </div>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>

    </div>

    <!-- XP CARD -->
    <div class="xp-card">

        <div class="xp-top">
            <span>XP Progress</span>
            <span id="xpText">0 / 100 XP</span>
        </div>

        <div class="xp-bar">
            <div id="xpFill" class="xp-fill"></div>
        </div>

    </div>

    <!-- CREATE QUEST -->
    <div class="quest-card">

        <h2>Create New Quest</h2>

        <input type="text" id="questTitle" placeholder="Enter quest title">

        <select id="questDifficulty">
            <option value="10">Easy (+10 XP)</option>
            <option value="25">Medium (+25 XP)</option>
            <option value="50">Hard (+50 XP)</option>
        </select>

        <button class="create-btn" onclick="createQuest()">
            Create Quest
        </button>

    </div>

    <!-- ACTIVE QUESTS -->
    <div class="quest-card">

        <h2>Active Quests</h2>

        <div id="questList"></div>

    </div>

</div>

<script src="script.js"></script>

<script>
loadDashboard();
</script>

</body>
</html>
